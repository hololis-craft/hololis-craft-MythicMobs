#ボス第1形態にて残りHPが400(ハート２００個分)と等しい場合にトーテムをオフハンドに自動装備する
#トーテムが割れて第2形態に移行したという風にプレイヤーに見せるため
suiseisavemylife:
  Conditions:
    - stance{stance=suisei-second-phase-like} false
    - stance{stance=suisei-second-phase} false
  Skills:
    - equip{item=totem_of_undying OFFHAND} @self
    - effect:sound{s=item.armor.equip_generic;v=4;p=1} @PIR{r=60}
