#ボス第２形態にて自身に継続ダメージを発生させる
#第2形態はボスの攻撃範囲が増え、遠距離戦を想定
#遠距離では長引くため持続ダメージによるプレイヤーのボス討伐アシスト
suiseiselfdamage1:
  Cooldown: 1
  Conditions:
    - stance{stance=suisei-second-phase-like} false
    - stance{stance=suisei-second-phase} true
    - stance{stance=suisei-death} false
  Skills:
    - potion{t=HEAL;d=3;l=2;force=true} @self

suiseiselfdamage2:
  Cooldown: 1
  Conditions:
    - stance{stance=suisei-second-phase} true
    - stance{stance=suisei-death} false
  Skills:
    - potion{t=REGENERATION;d=3;l=3;force=true} @self
