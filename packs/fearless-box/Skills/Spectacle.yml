Whirlwind:
  Cooldown: 6.5
  Conditions:
    - crouching false
    - onground false
  Skills:
    - leap{velocity=1150} @targetlocation
    - effect:sound{s=entity.witch.throw;v=2.5;p=0.45} @self
    - effect:sound{s=item.trident.riptide_3;v=5;p=0} @self
    - effect:particlesphere{particle=reddust;color=#F7F136;amount=50;radius=3.5} @self
    - effect:particlesphere{particle=Electric_Spark;amount=120;radius=2.5} @self
